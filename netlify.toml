[build]
  publish = "."

# The service worker is the update trigger for installed PWAs. Force a
# revalidation on every fetch so the browser (notably iOS Safari, which
# checks lazily) can't serve a stale sw.js and miss a new CACHE version.
[[headers]]
  for = "/projects/benny-card-game/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # CSP: defence-in-depth so an XSS via innerHTML can't exfiltrate data or
    # load external scripts. Everything the site needs is same-origin.
    # `style-src 'unsafe-inline'` because some innerHTML templates set
    # inline styles; if those are ever migrated to classes this can tighten.
    # `img-src https:` accepts the occasional remote image without
    # enumerating every host.
    Content-Security-Policy = "default-src 'self'; script-src 'self'; connect-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; worker-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'"
